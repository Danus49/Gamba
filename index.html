<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 TŘÍDNÍ GAMBA ELITE 💰</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        :root { --gold: #f0b90b; --bg: #0b0e11; --card: #1e2329; --text: #eaecef; --red: #ff4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin: 10px; width: 95%; max-width: 450px; border: 1px solid #333; text-align: center; }
        .gold-border { border-color: var(--gold); }
        h1, h2, h3 { color: var(--gold); margin: 10px 0; }
        input { background: #2b3139; border: 1px solid #474d57; color: white; padding: 10px; border-radius: 8px; width: calc(100% - 22px); margin: 5px 0; }
        button { background: var(--gold); color: black; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin: 5px 0; }
        .btn-admin { background: var(--red); color: white; }
        .user-row { background: #2b3139; margin: 5px 0; padding: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--gold); }
        #admin-panel { display: none; background: #2c0b0b; border: 1px solid var(--red); }
        .stats { font-size: 2em; font-weight: bold; color: var(--gold); }
    </style>
</head>
<body>

    <h1>💰 GAMBA ELITE 💰</h1>

    <div id="login-screen" class="card gold-border">
        <input type="text" id="nick-input" placeholder="Tvoje jméno...">
        <button onclick="login()">VSTOUPIT DO HRY</button>
    </div>

    <div id="game-screen" style="display:none; width: 100%; max-width: 450px;">
        <div class="card gold-border">
            <h2 id="display-nick">Hráč</h2>
            <div class="stats"><span id="display-coins">0</span> 🪙</div>
            <hr style="border:0.5px solid #333">
            <h3>🎰 COINFLIP (50/50)</h3>
            <input type="number" id="bet-amount" value="20">
            <button onclick="coinflip()">HODIT MINCÍ</button>
        </div>

        <div class="card">
            <h3>🏆 ŽEBŘÍČEK</h3>
            <div id="leaderboard">Načítám sázkaře...</div>
        </div>

        <p style="color: #444; font-size: 10px; cursor: pointer;" onclick="openAdmin()">🔧 Admin Access</p>
    </div>

    <div id="admin-panel" class="card">
        <h2 style="color:var(--red)">🛠 ADMIN KONZOLE</h2>
        <input type="text" id="adm-target" placeholder="Komu připsat?">
        <input type="number" id="adm-amt" placeholder="Kolik?">
        <button onclick="adminAdd()" class="btn-admin">PŘIPSAT COINY</button>
        <button onclick="adminReset()" style="background:black; color:white; margin-top:10px;">💥 RESET VŠEHO (200 start)</button>
        <button onclick="document.getElementById('admin-panel').style.display='none'">ZAVŘÍT</button>
    </div>

    <script>
        // Databáze
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const db = gun.get('tridni-gamba-vFinal-Danus'); 

        let userNick = "";
        let userData = { coins: 0 };

        // 1. OPRAVENÁ FUNKCE LOGIN
        function login() {
            userNick = document.getElementById('nick-input').value.trim().toLowerCase();
            if(userNick.length < 2) return alert("Nick je moc krátký!");
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('display-nick').innerText = userNick;

            db.get(userNick).on(data => {
                if(data && typeof data.coins === 'number') {
                    userData = data;
                    document.getElementById('display-coins').innerText = data.coins;
                } else {
                    db.get(userNick).put({ nick: userNick, coins: 200 });
                }
            });
        }

        // 2. OPRAVENÁ FUNKCE COINFLIP
        function coinflip() {
            let bet = parseInt(document.getElementById('bet-amount').value);
            if(isNaN(bet) || bet <= 0) return alert("Zadej normální sázku!");
            if(bet > userData.coins) return alert("Tolik nemáš!");

            let win = Math.random() > 0.5;
            db.get(userNick).put({ coins: win ? userData.coins + bet : userData.coins - bet });
            alert(win ? "VÝHRA! 🎉" : "PROHRA! 💀");
        }

        // 3. ADMIN FUNKCE
        function openAdmin() {
            if(prompt("Heslo:") === "Danus123") {
                document.getElementById('admin-panel').style.display = 'block';
            }
        }

        function adminAdd() {
            let t = document.getElementById('adm-target').value.toLowerCase();
            let a = parseInt(document.getElementById('adm-amt').value);
            if(!t || isNaN(a)) return alert("Chybí jméno nebo částka!");
            
            db.get(t).once(d => {
                let curr = (d && d.coins) ? d.coins : 0;
                db.get(t).put({ nick: t, coins: curr + a });
                alert("Připsáno!");
            });
        }

        function adminReset() {
            if(confirm("Opravdu reset? Všichni dostanou 200.")) {
                db.map().once((d, k) => {
                    db.get(k).put({ nick: k, coins: 200 });
                });
                alert("Resetováno!");
                location.reload();
            }
        }

        // 4. ŽEBŘÍČEK SYNC
        db.map().on((data, key) => {
            if(!data || data.coins === undefined || !data.nick) return;
            let id = 'row-' + key;
            let el = document.getElementById(id);
            if(!el) {
                el = document.createElement('div');
                el.id = id;
                el.className = 'user-row';
                document.getElementById('leaderboard').appendChild(el);
            }
            el.innerHTML = `<span>${data.nick}</span> <strong>${data.coins} 🪙</strong>`;
        });
    </script>
</body>
</html>
