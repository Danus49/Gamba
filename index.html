<!DOCTYPE html>
<html>
<head>
    <title>TŘÍDNÍ GAMBA</title>
    <script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; text-align: center; }
        .card { background: #333; padding: 20px; border-radius: 10px; margin: 10px auto; max-width: 400px; border: 1px solid gold; }
        input { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        button { background: gold; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .leaderboard { list-style: none; padding: 0; }
        .user-row { background: #444; margin: 5px; padding: 10px; border-radius: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <h1>💰 GAMBA ONLINE 💰</h1>

    <div id="login-box" class="card">
        <input type="text" id="nick" placeholder="Tvoje jméno">
        <button onclick="login()">VSTOUPIT</button>
    </div>

    <div id="game-box" style="display:none;">
        <div class="card">
            <h2 id="my-name">---</h2>
            <h3>Moje coiny: <span id="my-coins">0</span> 🪙</h3>
            <button onclick="coinflip()">🎰 COINFLIP (Sázka 10)</button>
            <button onclick="takeLoan()" style="background: #ff4444; color: white;">💸 PŮJČKA (100)</button>
        </div>

        <div class="card">
            <h3>🏆 MĚSÍČNÍ LEADERBOARD</h3>
            <div id="leaderboard"></div>
        </div>
    </div>

    <script>
        // Inicializace databáze (připojí se k veřejnému "relayi")
        const gun = Gun(['https://gun-manhattan.herokuapp.com/gun']);
        const db = gun.get('tridni-gamba-v1'); 

        let myNick = "";
        let myData = { coins: 200 };

        function login() {
            myNick = document.getElementById('nick').value;
            if(!myNick) return alert("Zadej jméno!");
            
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('game-box').style.display = 'block';
            document.getElementById('my-name').innerText = "Hráč: " + myNick;

            // Připojíme se na data konkrétního hráče
            db.get(myNick).on(data => {
                if(data) {
                    myData = data;
                    document.getElementById('my-coins').innerText = data.coins;
                } else {
                    // Nový hráč
                    db.get(myNick).put({ coins: 200 });
                }
            });
        }

        function coinflip() {
            let win = Math.random() > 0.5;
            let newBalance = win ? myData.coins + 10 : myData.coins - 10;
            db.get(myNick).put({ coins: newBalance });
            alert(win ? "VÝHRA! 🎉" : "PROHRA! 💀");
        }

        function takeLoan() {
            db.get(myNick).put({ coins: myData.coins + 100 });
            alert("Půjčeno 100 coinů! Nezapomeň je vrátit (nebo ne :D)");
        }

        // LEADERBOARD - Sleduje všechny hráče v reálném čase
        db.map().on((data, key) => {
            if(!data || !data.coins) return;
            let rowId = 'row-' + key;
            let row = document.getElementById(rowId);
            if(!row) {
                row = document.createElement('div');
                row.id = rowId;
                row.className = 'user-row';
                document.getElementById('leaderboard').appendChild(row);
            }
            row.innerHTML = `<span>${key}</span> <strong>${data.coins} 🪙</strong>`;
        });
    </script>
</body>
</html>
