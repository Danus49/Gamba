<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Class Betting v4</title>
<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f0f4f8; margin:0; padding:0; display:flex; justify-content:center; }
.container { max-width:600px; width:90%; background:#fff; padding:20px 30px; border-radius:12px; margin-top:40px; box-shadow:0 8px 20px rgba(0,0,0,0.1); }
h1 { text-align:center; color:#2c3e50; }
h2,h3 { color:#34495e; }
input { width: calc(100% - 20px); padding:10px; margin:8px 0; border:1px solid #ccc; border-radius:6px; }
button { background-color:#3498db; color:white; padding:8px 16px; margin:5px 0; border:none; border-radius:6px; cursor:pointer; transition:0.2s; }
button:hover { background-color:#2980b9; }
#bets-list div { background:#ecf0f1; padding:10px; border-radius:6px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
#bets-list button { background-color:#2ecc71; }
#bets-list button:hover { background-color:#27ae60; }
#coins { font-weight:bold; color:#e67e22; }
#leaderboard { background:#fff3cd; padding:10px; border-radius:6px; margin-top:10px; }
.admin-panel { background:#dff0ff; padding:10px; border-radius:6px; margin-bottom:10px; }
</style>
</head>
<body>
<div class="container">

<h1>Class Betting v4</h1>

<div id="login-section">
  <h2>Login / Register</h2>
  <input id="username" placeholder="Your name">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login / Register</button>
  <p id="login-status" style="color:red;"></p>
</div>

<div id="dashboard" style="display:none;">
  <h2>Welcome <span id="user-name"></span></h2>
  <p>Coins: <span id="coins"></span></p>

  <div id="admin-section" style="display:none;">
    <h3>Admin Panel</h3>
    <div class="admin-panel">
      <input id="new-question" placeholder="Question">
      <input id="answer1" placeholder="Answer 1">
      <input id="answer2" placeholder="Answer 2">
      <button onclick="addBet()">Add Bet</button>
      <button onclick="lockAllBets()">Lock All Bets</button>
    </div>
  </div>

  <h3>Bets</h3>
  <div id="bets-list"></div>

  <h3>Leaderboard</h3>
  <div id="leaderboard"></div>
</div>

<script>
// ---------- DATA STORAGE ----------
if(!localStorage.users) localStorage.users = JSON.stringify({});
if(!localStorage.bets) localStorage.bets = JSON.stringify([]);

// ---------- CREATE DEFAULT ADMIN ----------
window.onload = ()=>{
  let users = JSON.parse(localStorage.users);
  if(!users["Danus"]){
    users["Danus"] = {coins:1000, admin:true, password:"Danus123"};
    localStorage.users = JSON.stringify(users);
  }
  loadBets();
  loadLeaderboard();
}

// ---------- LOGIN / REGISTER ----------
let currentUser = null;
function login(){
  const name = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value;

  if(!name || !pass) return document.getElementById("login-status").innerText="Enter username and password";

  let users = JSON.parse(localStorage.users);
  if(users[name]){
    if(users[name].password !== pass){
      document.getElementById("login-status").innerText="Wrong password!";
      return;
    }
  } else {
    users[name] = {coins:100, admin:false, password:pass};
    localStorage.users = JSON.stringify(users);
  }

  currentUser = name;
  document.getElementById("login-section").style.display="none";
  document.getElementById("dashboard").style.display="block";
  document.getElementById("user-name").innerText = currentUser;
  document.getElementById("coins").innerText = users[currentUser].coins;

  // Show admin panel only if admin
  document.getElementById("admin-section").style.display = users[currentUser].admin ? "block" : "none";

  loadBets();
  loadLeaderboard();
}

// ---------- ADMIN: ADD BET ----------
function addBet(){
  if(!currentUser) return;
  let users = JSON.parse(localStorage.users);
  if(!users[currentUser].admin) { alert("You are not admin"); return; }

  const question = document.getElementById("new-question").value.trim();
  const a1 = document.getElementById("answer1").value.trim();
  const a2 = document.getElementById("answer2").value.trim();
  if(!question || !a1 || !a2) return alert("Fill all fields");

  let bets = JSON.parse(localStorage.bets);
  bets.push({question:question, answers:[a1,a2], pool:[0,0], locked:false});
  localStorage.bets = JSON.stringify(bets);

  document.getElementById("new-question").value="";
  document.getElementById("answer1").value="";
  document.getElementById("answer2").value="";
  loadBets();
}

// ---------- ADMIN: LOCK ALL BETS ----------
function lockAllBets(){
  if(!currentUser) return;
  let users = JSON.parse(localStorage.users);
  if(!users[currentUser].admin) { alert("You are not admin"); return; }

  let bets = JSON.parse(localStorage.bets);
  bets.forEach(b => b.locked = true);
  localStorage.bets = JSON.stringify(bets);
  loadBets();
}

// ---------- DISPLAY BETS ----------
function loadBets(){
  let bets = JSON.parse(localStorage.bets);
  let html = "";
  bets.forEach((b,i)=>{
    let btns = "";
    if(b.locked){
      btns = "<span>Locked</span>";
    } else {
      btns = b.answers.map((ans,j)=>`<button onclick="placeBet(${i},${j})">${ans} (10)</button>`).join(" ");
    }
    html += `<div><strong>${b.question}</strong> | ${btns} | Pool: ${b.pool.reduce((a,b)=>a+b,0)}</div>`;
  });
  document.getElementById("bets-list").innerHTML = html;
}

// ---------- PLACE BET ----------
function placeBet(betIndex, answerIndex){
  let users = JSON.parse(localStorage.users);
  let bets = JSON.parse(localStorage.bets);
  if(bets[betIndex].locked) return alert("This bet is locked!");
  if(users[currentUser].coins < 10) return alert("Not enough coins");

  users[currentUser].coins -= 10;
  localStorage.users = JSON.stringify(users);

  bets[betIndex].pool[answerIndex] += 10;
  localStorage.bets = JSON.stringify(bets);

  document.getElementById("coins").innerText = users[currentUser].coins;
  loadBets();
  loadLeaderboard();
}

// ---------- LEADERBOARD ----------
function loadLeaderboard(){
  let users = JSON.parse(localStorage.users);
  let arr = [];
  for(let u in users){
    arr.push({name:u, coins:users[u].coins});
  }
  arr.sort((a,b)=>b.coins-a.coins);

  let html = "<ol>";
  arr.forEach(u=>{ html += `<li>${u.name} - ${u.coins} coins</li>`; });
  html += "</ol>";
  document.getElementById("leaderboard").innerHTML = html;
}
</script>

</div>
</body>
</html>
