<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Class Gamba</title>

<style>

body{
font-family:Arial;
background:#f3f3f3;
display:flex;
justify-content:center;
}

.container{
background:white;
width:650px;
padding:30px;
margin-top:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:8px;
margin:6px 0;
}

button{
padding:8px 12px;
background:#3498db;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

#dashboard{display:none}
#register{display:none}
#admin{display:none}

.bet{
background:#eee;
padding:10px;
margin:10px 0;
border-radius:6px;
}

</style>

</head>
<body>

<div class="container">

<h1>Class Gamba</h1>

<div id="login">

<h2>Login</h2>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p>No account? <a onclick="showRegister()">Register</a></p>

<p id="loginMsg"></p>

</div>

<div id="register">

<h2>Register</h2>

<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<p><a onclick="showLogin()">Back</a></p>

<p id="regMsg"></p>

</div>

<div id="dashboard">

<h2>Welcome <span id="name"></span></h2>

Coins: <span id="coins"></span>

<div id="admin">

<h3>Admin Panel</h3>

<input id="q" placeholder="Question">
<input id="a1" placeholder="Answer 1">
<input id="a2" placeholder="Answer 2">

<button onclick="addBet()">Add Bet</button>

<h4>Set coins</h4>

<input id="coinUser" placeholder="Username">
<input id="coinValue" placeholder="Coins">

<button onclick="setCoins()">Set Coins</button>

</div>

<h3>Bets</h3>

<div id="bets"></div>

<h3>Leaderboard</h3>

<div id="leaderboard"></div>

</div>

</div>

<script>

const REPO_OWNER="Danus49"
const REPO_NAME="Gamba"
const FILE="data.json"
const TOKEN="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"

let users={}
let bets=[]
let sha=""
let currentUser=""

function showRegister(){
document.getElementById("login").style.display="none"
document.getElementById("register").style.display="block"
}

function showLogin(){
document.getElementById("register").style.display="none"
document.getElementById("login").style.display="block"
}

async function loadData(){

let res=await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE}`)

let data=await res.json()

sha=data.sha

let decoded=JSON.parse(atob(data.content))

users=decoded.users
bets=decoded.bets

renderBets()
renderLeaderboard()

}

async function saveData(){

let content=btoa(JSON.stringify({
users:users,
bets:bets
},null,2))

await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE}`,{

method:"PUT",

headers:{
Authorization:"token "+TOKEN
},

body:JSON.stringify({

message:"update gamba data",

content:content,

sha:sha

})

})

loadData()

}

function register(){

let u=document.getElementById("regUser").value
let p=document.getElementById("regPass").value

if(users[u]){
document.getElementById("regMsg").innerText="User exists"
return
}

users[u]={coins:100,password:p,admin:false}

saveData()

document.getElementById("regMsg").innerText="Registered"

}

function login(){

let u=document.getElementById("loginUser").value
let p=document.getElementById("loginPass").value

if(!users[u]){
document.getElementById("loginMsg").innerText="User not found"
return
}

if(users[u].password!==p){
document.getElementById("loginMsg").innerText="Wrong password"
return
}

currentUser=u

document.getElementById("login").style.display="none"
document.getElementById("dashboard").style.display="block"

document.getElementById("name").innerText=u
document.getElementById("coins").innerText=users[u].coins

if(users[u].admin){
document.getElementById("admin").style.display="block"
}

renderBets()
renderLeaderboard()

}

function addBet(){

let question=document.getElementById("q").value
let ans1=document.getElementById("a1").value
let ans2=document.getElementById("a2").value

bets.push({
question:question,
answers:[ans1,ans2],
pool:[0,0],
locked:false
})

saveData()

}

function placeBet(i,a){

if(users[currentUser].coins<10){
alert("Not enough coins")
return
}

users[currentUser].coins-=10

bets[i].pool[a]+=10

document.getElementById("coins").innerText=users[currentUser].coins

saveData()

}

function renderBets(){

let html=""

bets.forEach((b,i)=>{

html+=`
<div class="bet">
<b>${b.question}</b><br>
<button onclick="placeBet(${i},0)">${b.answers[0]}</button>
<button onclick="placeBet(${i},1)">${b.answers[1]}</button>
</div>
`

})

document.getElementById("bets").innerHTML=html

}

function renderLeaderboard(){

let arr=[]

for(let u in users){

arr.push({name:u,coins:users[u].coins})

}

arr.sort((a,b)=>b.coins-a.coins)

let html="<ol>"

arr.forEach(p=>{

html+=`<li>${p.name} - ${p.coins}</li>`

})

html+="</ol>"

document.getElementById("leaderboard").innerHTML=html

}

function setCoins(){

let u=document.getElementById("coinUser").value
let v=parseInt(document.getElementById("coinValue").value)

users[u].coins=v

saveData()

}

loadData()

setInterval(loadData,5000)

</script>

</body>
</html>
